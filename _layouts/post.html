---
layout: default
---
<div class="term-cmd-header">
  <span class="term-prompt-inline">
    <span class="prompt-user">serj</span><span class="prompt-at">@</span><span class="prompt-host">blog</span><span class="prompt-colon">:</span><span class="prompt-dir">~</span><span class="prompt-dollar">$</span>
  </span>
  <span class="cmd-text">/cat <span class="cmd-arg">{{ page.path | remove: '_posts/' }}</span></span>
</div>

<article class="post">
  <a class="back-link" href="{{ '/' | relative_url }}">← /ls</a>

  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <div class="post-meta">
      <span class="meta-date">{{ page.date | date: "%Y-%m-%d" }}</span>
      {% if page.tags %}
        {% for tag in page.tags %}<span class="tag">[{{ tag }}]</span>{% endfor %}
      {% endif %}
    </div>
  </header>

  <div class="post-content">
    {{ content }}
  </div>
</article>
