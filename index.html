---
layout: default
title: Blog
---

<div class="term-cmd-header">
  <span class="term-prompt-inline">
    <span class="prompt-user">serj</span><span class="prompt-at">@</span><span class="prompt-host">blog</span><span class="prompt-colon">:</span><span class="prompt-dir">~</span><span class="prompt-dollar">$</span>
  </span>
  <span class="cmd-text">/ls <span class="cmd-flag">-l</span></span>
</div>

<div class="ls-header">total {{ site.posts | size }}</div>
<ul class="post-list">
  {% for post in site.posts %}
  <li class="ls-row">
    <span class="ls-perms">-rw-r--r--</span>
    <span class="ls-date">{{ post.date | date: "%Y-%m-%d" }}</span>
    <a class="ls-name" href="{{ post.url | relative_url }}">{{ post.path | remove: '_posts/' }}</a>
    <span class="ls-title">"{{ post.title }}"</span>
  </li>
  {% endfor %}
</ul>
