<footer class="site-footer">
  <div class="container">
    <div class="footer-prompt">
      <span class="term-prompt-small">
        <span class="prompt-user">serj</span><span class="prompt-at">@</span><span class="prompt-host">blog</span><span class="prompt-colon">:</span><span class="prompt-dir">~</span><span class="prompt-dollar">$</span>
      </span>
      <span class="cursor-blink">█</span>
    </div>
    <div class="footer-links">
      <span class="footer-copy">&copy; {{ 'now' | date: "%Y" }} {{ site.author }}</span>
      {% if site.github_username %}
        <a href="https://github.com/{{ site.github_username }}" target="_blank" rel="noopener noreferrer">github</a>
      {% endif %}
      <a href="{{ '/feed.xml' | relative_url }}">rss</a>
    </div>
  </div>
</footer>
